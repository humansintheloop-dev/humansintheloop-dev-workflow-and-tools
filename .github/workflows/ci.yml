name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        type: boolean
        required: true
        default: false
      version:
        description: "Version tag to create, e.g. v0.4.0"
        type: string
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run ruff check
        run: uv run --with ruff ruff check

      - name: Run pyright
        run: uvx pyright --level error src/

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck test-scripts/*.sh

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Run plugin JavaScript tests
        run: ./test-scripts/test-plugin-javascript.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: ./test-scripts/test-end-to-end.sh

  integration-gh:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure git to use gh for authentication
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh auth setup-git
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Run integration_gh tests
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TEST_ORG: ${{ secrets.GH_TEST_ORG }}
        run: uv run --python 3.12 python3 -m pytest tests/ -v -m integration_gh -s

  release:
    runs-on: ubuntu-latest
    needs: [lint, test, integration-gh]
    if: github.event_name == 'workflow_dispatch' && inputs.release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next minor version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            tag="${{ inputs.version }}"
          else
            tag=$(./scripts/calculate-minor-release.sh)
          fi
          echo "tag=$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes
